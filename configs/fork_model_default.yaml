# Configuration for Fork Detection Model Training (3-class)

experiment_name: "fork_detection_directional"

# Data paths
data:
  base_dir: "data/raw"
  run_dirs:
    - "NM30_plot_data_1strun_xy"
    - "NM30_plot_data_2ndrun_xy"
  left_forks_bed: "data/raw/left_forks.bed"
  right_forks_bed: "data/raw/right_forks.bed"

# Preprocessing
preprocessing:
  oversample_ratio: 0.5
  percentile: 100
  use_enhanced_encoding: true
  random_seed: 42

# Model architecture
model:
  type: "fork_detector"
  max_length: null  # Auto-determined
  n_channels: 9
  n_classes: 3  # background, left fork, right fork
  cnn_filters: 64
  lstm_units: 128
  dropout_rate: 0.3

# Training
training:
  epochs: 150
  batch_size: 32
  learning_rate: 0.0005
  test_size: 0.2

  # Multi-class focal loss
  loss:
    type: "multi_class_focal"
    alpha: [1.0, 2.0, 2.0]  # [background, left_fork, right_fork]
    gamma: 2.0

  # Callbacks
  early_stopping:
    enabled: true
    monitor: "val_accuracy"
    patience: 25
    mode: "max"

  reduce_lr:
    enabled: true
    monitor: "val_accuracy"
    factor: 0.5
    patience: 10
    min_lr: 1.0e-7

  checkpoint:
    enabled: true
    monitor: "val_accuracy"
    save_best_only: true

# Output
output:
  model_dir: "models"
  model_filename: "fork_detector_3class.keras"
  results_dir: "results/fork_detector"
  plots_dir: "results/fork_detector/plots"
  metrics_dir: "results/fork_detector/metrics"

# Evaluation
evaluation:
  confidence_threshold: 0.5  # Confidence for calling forks
  export_bed: true  # Export detected forks as BED files
